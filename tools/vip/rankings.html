<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rankings — Chemie's VIP Corner</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="../../assets/css/theme.css" />
  <link rel="stylesheet" href="./vip.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <a class="brand" href="../../"><span class="crest">🛡️</span> Maxy's Empire <b>Toolkit</b></a>
    </div>
  </header>

  <main class="wrap">
    <div class="tool-head">
      <a class="back" href="./index.html">← VIP Corner</a>
      <h1>📊 Player &amp; Alliance Rankings</h1>
      <p>Live server rankings. Click a column to sort; use the filters to narrow down.</p>
    </div>

    <section class="panel">
      <div class="vip-nav">
        <a href="./rankings.html" class="active">Rankings</a>
        <a href="./empire-rankings.html">Live Event Rankings</a>
        <a href="./fortress.html">Fortress Tracker</a>
        <a href="./search.html">Search &amp; Analyse</a>
        <a href="./scores.html">Score Tools</a>
        <a href="./wall-break.html">Wall-Break Sim</a>
      </div>

      <div class="vip-toolbar" id="toolbar">
        <button class="vip-btn" id="tab-players">Players</button>
        <button class="vip-btn ghost" id="tab-alliances">Alliances</button>
        <input class="vip-input" id="f-alliance" placeholder="Filter: alliance name" />
        <input class="vip-input" id="f-minlevel" placeholder="Min level" style="min-width:90px" type="number" />
        <button class="vip-btn ghost" id="apply">Apply</button>
      </div>

      <div class="vip-status" id="status"></div>
      <div style="overflow-x:auto"><table class="vip-table" id="tbl"></table></div>
      <div class="vip-pager">
        <button class="vip-btn ghost" id="prev">← Prev</button>
        <span id="pageinfo"></span>
        <button class="vip-btn ghost" id="next">Next →</button>
      </div>

      <p class="vip-credit">Data: <a href="https://gge-tracker.com" target="_blank" rel="noopener">gge-tracker.com</a> public API.</p>
    </section>
  </main>

  <script src="./vip-shared.js"></script>
  <script>
    const { api, esc, num, mountServerPicker } = window.VIP;
    mountServerPicker(document.getElementById("toolbar"));

    let mode = "players", page = 1, totalPages = 1;
    let orderBy = "might_current", orderType = "DESC";

    const PLAYER_COLS = [
      { key: "player_name",    label: "Player",   cls: "nm" },
      { key: "alliance_name",  label: "Alliance" },
      { key: "level",          label: "Lvl",      cls: "r", sort: "level" },
      { key: "legendary_level",label: "Leg.",     cls: "r" },
      { key: "might_current",  label: "Might",    cls: "r", sort: "might_current", num: true },
      { key: "loot_current",   label: "Loot",     cls: "r", sort: "loot_current",  num: true },
      { key: "honor",          label: "Honor",    cls: "r", sort: "honor",         num: true },
      { key: "current_fame",   label: "Fame",     cls: "r", sort: "current_fame",  num: true },
    ];
    const ALLIANCE_COLS = [
      { key: "alliance_name",      label: "Alliance", cls: "nm" },
      { key: "player_count",       label: "Members",  cls: "r" },
      { key: "might_current",      label: "Might",    cls: "r", sort: "might_current", num: true },
      { key: "loot_current",       label: "Loot",     cls: "r", sort: "loot_current",  num: true },
      { key: "current_fame",       label: "Fame",     cls: "r", sort: "current_fame",  num: true },
      { key: "highest_fame",       label: "Best fame",cls: "r", num: true },
    ];

    async function load() {
      const status = document.getElementById("status");
      status.textContent = "Loading…"; status.className = "vip-status";
      try {
        let rows, cols;
        if (mode === "players") {
          const params = { page, orderBy, orderType };
          const fa = document.getElementById("f-alliance").value.trim();
          const ml = document.getElementById("f-minlevel").value.trim();
          if (fa) params.alliance = fa;
          if (ml) params.minLevel = ml;
          const d = await api("players", params);
          rows = d.players || []; cols = PLAYER_COLS;
          totalPages = d.pagination ? d.pagination.total_pages : 1;
          status.textContent = d.pagination ? num(d.pagination.total_items_count) + " players" : "";
        } else {
          const d = await api("alliances", { page, orderBy, orderType });
          rows = d.alliances || []; cols = ALLIANCE_COLS;
          totalPages = d.pagination ? d.pagination.total_pages : 1;
          status.textContent = d.pagination ? num(d.pagination.total_items_count) + " alliances" : "";
        }
        renderTable(rows, cols);
        document.getElementById("pageinfo").textContent = "Page " + page + " / " + totalPages;
      } catch (e) {
        status.textContent = "Error: " + e.message; status.className = "vip-status vip-error";
      }
    }

    function renderTable(rows, cols) {
      const tbl = document.getElementById("tbl");
      tbl.innerHTML = "<thead><tr>" + cols.map((c) =>
        '<th class="' + (c.sort ? "sortable" : "") + '" data-sort="' + (c.sort || "") + '">' +
        c.label + (c.sort === orderBy ? (orderType === "DESC" ? " ↓" : " ↑") : "") + "</th>"
      ).join("") + "</tr></thead>";
      const tb = document.createElement("tbody");
      rows.forEach((r) => {
        const tr = document.createElement("tr");
        tr.innerHTML = cols.map((c) => {
          const v = r[c.key];
          return '<td class="' + (c.cls || "") + '">' + (c.num ? num(v) : esc(v ?? "—")) + "</td>";
        }).join("");
        tb.appendChild(tr);
      });
      tbl.appendChild(tb);
      tbl.querySelectorAll("th.sortable").forEach((th) =>
        th.addEventListener("click", () => {
          const s = th.dataset.sort;
          if (!s) return;
          if (orderBy === s) orderType = orderType === "DESC" ? "ASC" : "DESC";
          else { orderBy = s; orderType = "DESC"; }
          page = 1; load();
        }));
    }

    document.getElementById("tab-players").addEventListener("click", function () {
      mode = "players"; page = 1; orderBy = "might_current";
      this.className = "vip-btn"; document.getElementById("tab-alliances").className = "vip-btn ghost";
      load();
    });
    document.getElementById("tab-alliances").addEventListener("click", function () {
      mode = "alliances"; page = 1; orderBy = "might_current";
      this.className = "vip-btn"; document.getElementById("tab-players").className = "vip-btn ghost";
      load();
    });
    document.getElementById("apply").addEventListener("click", () => { page = 1; load(); });
    document.getElementById("prev").addEventListener("click", () => { if (page > 1) { page--; load(); } });
    document.getElementById("next").addEventListener("click", () => { if (page < totalPages) { page++; load(); } });

    load();
  </script>
</body>
</html>
